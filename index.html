<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRODUCE 101 JAPAN 新世界 顔マージゲーム</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    :root {
      --bg-main: #050b4a;
      --bg-deep: #020735;
      --bg-mid: #0a2c86;
      --accent: #1673ff;
      --accent-2: #66d9e6;
      --accent-3: #8fe7ff;
      --text-main: #f5f8ff;
      --text-sub: #d8e3ff;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --panel-border: rgba(103, 154, 255, 0.42);
      --glow: rgba(26, 115, 255, 0.35);
      --danger: #86d3ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(32, 92, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #07105b 0%, #03083d 45%, #020735 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(135deg, rgba(102, 217, 230, 0.18) 0 6%, transparent 6% 100%),
        linear-gradient(225deg, rgba(22, 115, 255, 0.12) 0 9%, transparent 9% 100%),
        linear-gradient(315deg, rgba(143, 231, 255, 0.08) 0 4%, transparent 4% 100%);
      opacity: 0.55;
      mix-blend-mode: screen;
    }

    body::after {
      background:
        radial-gradient(circle at 8% 20%, rgba(201, 212, 15, 0.18) 0 2%, transparent 2.1%),
        radial-gradient(circle at 12% 36%, rgba(215, 133, 169, 0.22) 0 2.2%, transparent 2.3%),
        radial-gradient(circle at 88% 63%, rgba(22, 115, 255, 0.18) 0 7%, transparent 7.2%),
        radial-gradient(circle at 80% 88%, rgba(143, 231, 255, 0.2) 0 5%, transparent 5.2%);
      opacity: 0.45;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px 40px;
      text-align: center;
    }

    .hero-header {
      width: 100%;
      max-width: 980px;
      margin: 0 auto 18px;
      padding-top: 14px;
    }

    .hero-header-img {
      width: 100%;
      display: block;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(126, 214, 255, 0.18);
    }

    .brand-block {
      margin: 4px auto 18px;
    }

    .brand-logo {
      width: min(420px, 82vw);
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.28));
      border-radius: 12px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--text-main);
    }

    .score-chip,
    .next-wrap,
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      padding: 8px 12px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    #nextPreview {
      width: 42px;
      height: 42px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(138, 189, 255, 0.65);
      background: #fff;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--text-sub);
    }

    label.toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-sub);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      padding: 10px 14px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    button {
      font: inherit;
      padding: 9px 14px;
      border-radius: 12px;
      border: 1px solid rgba(124, 175, 255, 0.4);
      background: linear-gradient(180deg, rgba(28, 97, 255, 0.92), rgba(9, 53, 166, 0.92));
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(10, 37, 130, 0.32);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(10, 37, 130, 0.38);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .picker-info {
      margin: 10px 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
    }

    .picker-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-sub);
      opacity: 0.92;
    }

    .member-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 1040px;
      margin: 0 auto 18px;
    }

    .member-card {
      width: 78px;
      padding: 6px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      user-select: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }

    .member-card:hover {
      transform: translateY(-2px);
    }

    .member-card.selected {
      border-color: rgba(115, 197, 255, 0.95);
      background: rgba(28, 95, 255, 0.2);
      box-shadow:
        0 0 0 1px rgba(115, 197, 255, 0.5),
        0 10px 24px rgba(17, 92, 255, 0.28);
    }

    .member-card.locked {
      opacity: 0.38;
    }

    .member-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto 6px;
      background: #fff;
      border: 2px solid rgba(145, 201, 255, 0.45);
    }

    .member-card .name {
      font-size: 10px;
      line-height: 1.3;
      color: var(--text-main);
      word-break: break-word;
    }

    .roster {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0 auto 14px;
      max-width: 860px;
      min-height: 76px;
    }

    .roster-item {
      width: 72px;
      font-size: 11px;
      line-height: 1.3;
      color: var(--text-main);
    }

    .roster-item img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(145, 201, 255, 0.55);
      background: white;
      display: block;
      margin: 0 auto 4px;
    }

    .game-wrap {
      width: 420px;
      height: 620px;
      margin: 0 auto;
      position: relative;
    }

    #game {
      width: 420px;
      height: 620px;
      border: 3px solid rgba(117, 175, 255, 0.55);
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(86, 187, 255, 0.22), transparent 25%),
        linear-gradient(180deg, #09145f 0%, #071050 40%, #03083b 100%);
      position: relative;
      box-shadow:
        0 0 0 1px rgba(140, 199, 255, 0.15),
        0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .game-over-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 0;
      border-top: 3px dashed rgba(134, 211, 255, 0.95);
      z-index: 6;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(118, 204, 255, 0.45);
    }

    .game-over-line-label {
      position: absolute;
      right: 8px;
      top: -18px;
      background: rgba(44, 128, 255, 0.95);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .drop-guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
    }

    .drop-guide::before {
      content: "";
      position: absolute;
      top: 16px;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(120, 140, 255, 0.5), rgba(120, 140, 255, 0));
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .drop-guide.active::before {
      opacity: 1;
    }

    .drop-ghost {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(134, 211, 255, 0.95);
      background: rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 18px rgba(60, 146, 255, 0.35),
        0 8px 20px rgba(25, 45, 120, 0.24);
      transition: left 0.03s linear, width 0.1s ease, height 0.1s ease;
    }

    .drop-ghost img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .merge-effects {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .merge-burst {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      border: 4px solid rgba(133, 224, 255, 0.98);
      background: rgba(70, 157, 255, 0.2);
      animation: mergeBurst 0.45s ease-out forwards;
      box-shadow: 0 0 24px rgba(87, 189, 255, 0.42);
    }

    .merge-text {
      position: absolute;
      transform: translate(-50%, -50%);
      font-weight: 700;
      font-size: 14px;
      color: #dff4ff;
      text-shadow: 0 0 10px rgba(74, 170, 255, 0.7);
      animation: mergeTextFloat 0.7s ease-out forwards;
      white-space: nowrap;
    }

    .max-ring {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.3);
      border: 6px solid rgba(135, 233, 255, 0.98);
      box-shadow:
        0 0 30px rgba(95, 185, 255, 0.58),
        0 0 60px rgba(103, 233, 224, 0.35);
      animation: maxRing 0.85s ease-out forwards;
    }

    .max-stars {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 28px;
      animation: maxStars 0.9s ease-out forwards;
      white-space: nowrap;
    }

    @keyframes mergeBurst {
      0% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.8);
      }
    }

    @keyframes mergeTextFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, -30%) scale(0.8);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -95px) scale(1.08);
      }
    }

    @keyframes maxRing {
      0% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.3);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.2);
      }
    }

    @keyframes maxStars {
      0% {
        opacity: 0;
        transform: translate(-50%, -20%) scale(0.5);
      }
      15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -120px) scale(1.2);
      }
    }

    .max-level-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 16;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .max-level-badge {
      margin-top: 66px;
      background: rgba(6, 18, 84, 0.88);
      border: 1px solid rgba(126, 214, 255, 0.75);
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24);
      animation: maxBadgePop 0.9s ease;
    }

    .max-level-title {
      font-weight: 800;
      font-size: 18px;
      color: #8fe7ff;
      letter-spacing: 0.06em;
    }

    .max-level-name {
      margin-top: 3px;
      font-size: 13px;
      color: #f3f8ff;
    }

    @keyframes maxBadgePop {
      0% {
        opacity: 0;
        transform: translateY(-12px) scale(0.85);
      }
      25% {
        opacity: 1;
        transform: translateY(0) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 7, 40, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 18px;
      backdrop-filter: blur(4px);
    }

    .hidden {
      display: none;
    }

    .game-over-card {
      width: 280px;
      background: rgba(7, 18, 82, 0.92);
      border-radius: 18px;
      padding: 22px 18px;
      border: 1px solid rgba(126, 214, 255, 0.5);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      color: var(--text-main);
    }

    .game-over-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #8fe7ff;
    }

    .loading-cover {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background:
        radial-gradient(circle at top, rgba(32, 92, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #07105b 0%, #03083d 45%, #020735 100%);
      color: var(--text-main);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .loading-card {
      padding: 18px 22px;
      border-radius: 16px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: #d3dcff;
      line-height: 1.7;
    }

    @media (max-width: 520px) {
      .game-wrap,
      #game {
        width: 360px;
        height: 560px;
      }

      .member-card {
        width: 72px;
      }

      .member-card img {
        width: 54px;
        height: 54px;
      }

      .roster-item {
        width: 68px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingCover" class="loading-cover">
    <div class="loading-card">画像を読み込み中…</div>
  </div>

  <div class="app">
    <div class="hero-header">
      <img src="https://i.imgur.com/FynKTZX.png" alt="ヘッダー画像" class="hero-header-img" />
    </div>

    <div class="brand-block">
      <img src="https://i.imgur.com/b8qJMXj.jpeg" alt="PRODUCE 101 JAPAN 新世界 SHINSEKAI" class="brand-logo" />
    </div>

    <div class="topbar">
      <div class="score-chip">スコア: <strong id="score">0</strong></div>
      <div class="next-wrap">
        次:
        <img id="nextPreview" alt="次の顔" />
        <span id="nextName"></span>
      </div>
      <div class="status-chip">現在の11人を下に表示</div>
    </div>

    <div class="controls">
      <label class="toggle-label">
        <input type="checkbox" id="includeCandidates" checked />
        練習生候補も含める
      </label>

      <button id="randomSelectBtn">ランダムで11人選ぶ</button>
      <button id="newGameBtn" disabled>選んだ11人で開始</button>
      <button id="restartBtn">リスタート</button>
    </div>

    <div class="picker-info">
      選択中: <strong id="selectedCount">0</strong> / 11
      <div class="picker-sub">手動で11人選ぶか、ランダムで11人選んで開始できます。</div>
    </div>

    <div id="memberPicker" class="member-picker"></div>

    <div id="selectedRoster" class="roster"></div>

    <div id="gameWrap" class="game-wrap">
      <div id="game"></div>

      <div id="dropGuide" class="drop-guide">
        <div id="dropGhost" class="drop-ghost">
          <img id="dropGhostImg" alt="待機中の顔" />
        </div>
      </div>

      <div id="mergeEffects" class="merge-effects"></div>

      <div id="maxLevelOverlay" class="max-level-overlay hidden">
        <div class="max-level-badge">
          <div class="max-level-title">MAX LEVEL!</div>
          <div id="maxLevelName" class="max-level-name"></div>
        </div>
      </div>

      <div id="gameOverOverlay" class="game-over-overlay hidden">
        <div class="game-over-card">
          <h2>GAME OVER</h2>
          <p>スコア: <strong id="finalScore">0</strong></p>
          <button id="retryBtn">もう一回</button>
        </div>
      </div>
    </div>

    <p class="hint">
      PCは盤面内で左右に動かしてクリックで落下。<br />
      スマホは盤面内を左右にスライドして、指を離すと落下します。<br />
      同じメンバー・同じレベル同士で合体し、11人固定で遊べます。
    </p>
  </div>

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function unlockAudio() {
      const ctx = getAudioCtx();
      if (ctx.state === "suspended") {
        ctx.resume();
      }
    }

    function beep({ frequency = 440, duration = 0.12, type = "sine", volume = 0.03, ramp = true }) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);

      gain.gain.setValueAtTime(volume, now);
      if (ramp) {
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      } else {
        gain.gain.setValueAtTime(volume, now + duration);
      }

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + duration);
    }

    function playMergeSound(level) {
      unlockAudio();
      const base = 420 + level * 70;
      beep({ frequency: base, duration: 0.08, type: "triangle", volume: 0.045 });
      setTimeout(() => {
        beep({ frequency: base * 1.25, duration: 0.12, type: "triangle", volume: 0.04 });
      }, 55);
    }

    function playGameOverSound() {
      unlockAudio();
      beep({ frequency: 330, duration: 0.18, type: "sawtooth", volume: 0.045, ramp: false });
      setTimeout(() => beep({ frequency: 250, duration: 0.22, type: "sawtooth", volume: 0.04, ramp: false }), 130);
      setTimeout(() => beep({ frequency: 180, duration: 0.28, type: "sawtooth", volume: 0.035, ramp: true }), 280);
    }

      unlockAudio();
      beep({ frequency: 520, duration: 0.09, type: "triangle", volume: 0.05 });
      setTimeout(() => beep({ frequency: 660, duration: 0.09, type: "triangle", volume: 0.05 }), 70);
      setTimeout(() => beep({ frequency: 880, duration: 0.18, type: "triangle", volume: 0.05 }), 150);
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function renderMemberPicker() {
      const members = getPickerMembers();
      const selectedCount = selectedMembers.length;

      memberPickerEl.innerHTML = members.map(member => {
        const selected = isSelectedMember(member.id);
        const locked = !selected && selectedCount >= FIXED_POOL_SIZE;
        return `
          <div class="member-card ${selected ? "selected" : ""} ${locked ? "locked" : ""}" data-id="${member.id}">
            <img src="${member.img}" alt="${member.name}">
            <div class="name">${member.name}</div>
          </div>
        `;
      }).join("");

      memberPickerEl.querySelectorAll(".member-card").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.dataset.id;
          toggleMemberSelection(id);
        });
      });

      updateStartButtonState();

    function toggleMemberSelection(id) {
      const members = getPickerMembers();
      const target = members.find(member => member.id === id);
      if (!target) return;

      const alreadySelected = isSelectedMember(id);

      if (alreadySelected) {
        selectedMembers = selectedMembers.filter(member => member.id !== id);
      } else {
        if (selectedMembers.length >= FIXED_POOL_SIZE) return;
        selectedMembers.push(target);
      }

      renderMemberPicker();
    }

    function getSpriteScale(member, diameter) {
      const imgMeta = imageSizeMap.get(member.id);
      if (!imgMeta) return { xScale: diameter / 512, yScale: diameter / 512 };
      return {
        xScale: diameter / imgMeta.width,
        yScale: diameter / imgMeta.height
      };
    }

    function createFace(x, y, member, level) {
      const stage = LEVELS[level];
      const diameter = stage.radius * 2;
      const scale = getSpriteScale(member, diameter);

      const body = Bodies.circle(x, y, stage.radius, {
        restitution: 0.15,
        friction: 0.03,
        frictionAir: 0.01,
        density: 0.001,
        render: {
          sprite: {
            texture: member.img,
            xScale: scale.xScale,
            yScale: scale.yScale
          }
        }
      });

      body.memberId = member.id;
      body.memberName = member.name;
      body.memberImg = member.img;
      body.level = level;
      body.isMerging = false;

      return body;
    }

      text.style.left = `${x}px`;
      text.style.top = `${y}px`;
      text.textContent = `${memberName} Lv.${nextLevel + 1}!`;

      mergeEffectsEl.appendChild(burst);
      mergeEffectsEl.appendChild(text);

      setTimeout(() => burst.remove(), 500);
      setTimeout(() => text.remove(), 750);
    }

    function showMaxLevelEffect(x, y, memberName) {
      const ring = document.createElement("div");
      ring.className = "max-ring";
      ring.style.left = `${x}px`;
      ring.style.top = `${y}px`;
      ring.style.width = "110px";
      ring.style.height = "110px";

      const stars = document.createElement("div");
      stars.className = "max-stars";
      stars.style.left = `${x}px`;
      stars.style.top = `${y}px`;
      stars.textContent = "✨👑✨";

      mergeEffectsEl.appendChild(ring);
      mergeEffectsEl.appendChild(stars);

      setTimeout(() => ring.remove(), 900);
      setTimeout(() => stars.remove(), 950);

      maxLevelNameEl.textContent = `${memberName} が最高レベル到達！`;
      maxLevelOverlayEl.classList.remove("hidden");

      clearTimeout(showMaxLevelEffect._timer);
      showMaxLevelEffect._timer = setTimeout(() => {
        maxLevelOverlayEl.classList.add("hidden");
      }, 1200);
    }

    function dropFace(x) {
      if (!canDrop || !nextFruit || isGameOver) return;

      unlockAudio();

      const level = nextFruit.level;
      const radius = LEVELS[level].radius;
      const safeX = clamp(x, radius + 8, GAME_WIDTH - radius - 8);

      const body = createFace(safeX, DROP_Y, nextFruit.member, level);
      World.add(world, body);

      canDrop = false;
      setTimeout(() => {
        canDrop = true;
      }, DROP_COOLDOWN);

      makeNextFruit();
    }

    function getDynamicBodies() {
      return Composite.allBodies(world).filter(body => !body.isStatic && body.memberId);
    }

    function checkGameOver() {
      if (isGameOver) return;

      const bodies = getDynamicBodies();
      const touchingLine = bodies.some(body => {
        const radius = LEVELS[body.level]?.radius ?? body.circleRadius ?? 0;
        return (body.position.y - radius) <= GAME_OVER_LINE_Y;
      });

      if (touchingLine) {
        if (!overLineStartAt) {
          overLineStartAt = performance.now();
        } else if (performance.now() - overLineStartAt >= GAME_OVER_HOLD_MS) {
          triggerGameOver();
        }
      } else {
        overLineStartAt = null;
      }
    }

    function triggerGameOver() {
      isGameOver = true;
      canDrop = false;
      finalScoreEl.textContent = score;
      gameOverOverlayEl.classList.remove("hidden");
      dropGuideEl.classList.remove("active");
      playGameOverSound();
    }

    function removeDynamicBodies() {
      const allBodies = Composite.allBodies(world);
      allBodies.forEach((body) => {
        if (!body.isStatic) {
          World.remove(world, body);
        }
      });
    }

    function clearEffects() {
      mergeEffectsEl.innerHTML = "";
      maxLevelOverlayEl.classList.add("hidden");
    }

    function resetCommonState() {
      score = 0;
      canDrop = true;
      isGameOver = false;
      overLineStartAt = null;
      isTouchDragging = false;
      aimX = GAME_WIDTH / 2;
      updateScore();
      gameOverOverlayEl.classList.add("hidden");
      clearEffects();
    }

    function startNewGame() {
      if (selectedMembers.length !== FIXED_POOL_SIZE) return;

      removeDynamicBodies();
      resetCommonState();
      chooseRoster();
      renderRoster();
      makeNextFruit();
      updateDropGhostPosition();
      hasStarted = true;
    }

    function restartCurrentRoster() {
      if (!activeRoster.length) return;

      removeDynamicBodies();
      resetCommonState();
      nextFruit = {
        member: pickRandom(activeRoster),
        level: 0
      };
      updateNextPreview();
      updateDropGhostPosition();
    }

    function preloadImages() {
      const promises = allMembersStatic.map(member => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          imageSizeMap.set(member.id, {
            width: img.naturalWidth || 512,
            height: img.naturalHeight || 512
          });
          resolve();
        };
        img.onerror = () => {
          imageSizeMap.set(member.id, { width: 512, height: 512 });
          resolve();
        };
        img.src = member.img;
      }));

      return Promise.all(promises);
    }

    gameEl.addEventListener("mousemove", (e) => {
      if (isGameOver || !hasStarted) return;
      dropGuideEl.classList.add("active");
      updateAimXFromClientX(e.clientX);
    });

    gameEl.addEventListener("mouseenter", () => {
      if (isGameOver || !hasStarted) return;
      dropGuideEl.classList.add("active");
    });

    gameEl.addEventListener("mouseleave", () => {
      if (isTouchDragging) return;
      dropGuideEl.classList.remove("active");
    });

    gameEl.addEventListener("click", (e) => {
      if (isTouchDragging || !hasStarted) return;
      updateAimXFromClientX(e.clientX);
      dropFace(aimX);
    });

    gameEl.addEventListener("touchstart", (e) => {
      if (isGameOver || !hasStarted) return;
      unlockAudio();
      isTouchDragging = true;
      dropGuideEl.classList.add("active");
      if (e.touches[0]) {
        updateAimXFromClientX(e.touches[0].clientX);
      }
    }, { passive: true });

    gameEl.addEventListener("touchmove", (e) => {
      if (!isTouchDragging || isGameOver || !hasStarted) return;
      if (e.touches[0]) {
        updateAimXFromClientX(e.touches[0].clientX);
      }
    }, { passive: true });

    gameEl.addEventListener("touchend", () => {
      if (!isTouchDragging || isGameOver || !hasStarted) return;
      isTouchDragging = false;
      dropFace(aimX);
      dropGuideEl.classList.remove("active");
    }, { passive: true });

    Events.on(engine, "collisionStart", (event) => {
      if (isGameOver) return;

      for (const pair of event.pairs) {
        const a = pair.bodyA;
        const b = pair.bodyB;

        if (
          a.memberId === undefined ||
          b.memberId === undefined ||
          a.isMerging ||
          b.isMerging
        ) {
          continue;
        }

        const sameMember = a.memberId === b.memberId;
        const sameLevel = a.level === b.level;
        const canLevelUp = a.level < LEVELS.length - 1;

        if (!sameMember || !sameLevel || !canLevelUp) {
          continue;
        }

        a.isMerging = true;
        b.isMerging = true;

        const newX = (a.position.x + b.position.x) / 2;
        const newY = (a.position.y + b.position.y) / 2;
        const nextLevel = a.level + 1;

        const member = {
          id: a.memberId,
          name: a.memberName,
          img: a.memberImg
        };

        World.remove(world, a);
        World.remove(world, b);

        const merged = createFace(newX, newY, member, nextLevel);
        World.add(world, merged);

        Body.setVelocity(merged, {
          x: ((a.velocity.x || 0) + (b.velocity.x || 0)) * 0.15,
          y: Math.min(((a.velocity.y || 0) + (b.velocity.y || 0)) * 0.15, 0.5)
        });

        score += LEVELS[nextLevel].score;
        updateScore();

        showMergeEffect(newX, newY, nextLevel, member.name);
        playMergeSound(nextLevel);

        if (nextLevel === LEVELS.length - 1) {
          showMaxLevelEffect(newX, newY, member.name);
          playMaxLevelSound();
        }
      }
    });

    includeCandidatesEl.addEventListener("change", () => {
      const validIds = new Set(getPickerMembers().map(member => member.id));
      selectedMembers = selectedMembers.filter(member => validIds.has(member.id));
      renderMemberPicker();
    });

    randomSelectBtn.addEventListener("click", () => {
      randomSelectMembers();
      startNewGame();
    });

    newGameBtn.addEventListener("click", startNewGame);
    restartBtn.addEventListener("click", restartCurrentRoster);
    retryBtn.addEventListener("click", restartCurrentRoster);

    (function gameLoop() {
      checkGameOver();
      requestAnimationFrame(gameLoop);
    })();

    async function init() {
      addWalls();
      addGameOverLine();
      await preloadImages();
      renderMemberPicker();
      randomSelectMembers();
      startNewGame();
      loadingCoverEl.remove();
    }

    init();
  </script>
</body>
</html>
