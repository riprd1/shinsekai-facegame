<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日プ新世界 Face Game</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<style>

body{
margin:0;
background:#050B4A;
color:white;
font-family:sans-serif;
text-align:center;
}

.header img{
width:100%;
max-width:900px;
border-radius:15px;
}

.logo{
width:300px;
margin:10px auto;
display:block;
}

#ui{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

#next img{
width:50px;
height:50px;
border-radius:50%;
}

#game{
width:420px;
height:620px;
margin:auto;
border:3px solid #3aa7ff;
border-radius:15px;
position:relative;
overflow:hidden;
}

#line{
position:absolute;
top:110px;
width:100%;
border-top:3px dashed #8fd3ff;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#1673FF;
color:white;
cursor:pointer;
}

#settings{
position:absolute;
top:10px;
right:10px;
font-size:22px;
cursor:pointer;
}

#panel{
position:absolute;
top:50px;
right:10px;
background:#0b1c6b;
padding:10px;
border-radius:10px;
display:none;
}

canvas{
image-rendering:auto;
}

</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/FynKTZX.png">
<div id="settings">⚙️</div>
</div>

<img class="logo" src="https://i.imgur.com/b8qJMXj.jpeg">

<h2>日プ新世界 Face Game</h2>

<div id="ui">
<div>Score : <span id="score">0</span></div>
<div id="next">
NEXT<br>
<img id="nextImg">
</div>
</div>

<button onclick="location.href='index.html'">タイトルにもどる</button>
<button onclick="restart()">リスタート</button>

<div id="game">
<div id="line"></div>
</div>

<div id="panel">
BGM 🔈<br>
<input id="bgmVol" type="range" min="0" max="1" step="0.01"><br>
効果音 🔈<br>
<input id="seVol" type="range" min="0" max="1" step="0.01">
</div>

<audio id="bgm" loop src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f52d7d9b5.mp3"></audio>
<audio id="mergeSE" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_27361fa1c4.mp3"></audio>
<audio id="overSE" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0c84c3e0b3.mp3"></audio>

<script>

const members=JSON.parse(localStorage.getItem("selectedMembers"))||[]

if(!members.length) location.href="index.html"

const {Engine,Render,Runner,World,Bodies,Events}=Matter

const engine=Engine.create()
const world=engine.world

const render=Render.create({
element:document.getElementById("game"),
engine:engine,
options:{
width:420,
height:620,
wireframes:false,
pixelRatio:window.devicePixelRatio
}
})

Render.run(render)
Runner.run(Runner.create(),engine)

const wall=60

const ground=Bodies.rectangle(210,650,420,wall,{isStatic:true})
const left=Bodies.rectangle(-wall/2,310,wall,620,{isStatic:true})
const right=Bodies.rectangle(420+wall/2,310,wall,620,{isStatic:true})

World.add(world,[ground,left,right])

const SIZE=[24,30,38,50,65,85]

let score=0

let next=createNext()

function createNext(){
return{
member:members[Math.floor(Math.random()*members.length)],
level:0
}
}

updateNext()

function updateNext(){
document.getElementById("nextImg").src=next.member.img
}

document.getElementById("game").onclick=e=>{

const rect=e.currentTarget.getBoundingClientRect()
const x=e.clientX-rect.left

spawn(x)

}

function spawn(x){

const r=SIZE[next.level]

const body=Bodies.circle(x,60,r,{
restitution:0.15,
friction:0.2,
render:{
sprite:{
texture:next.member.img,
xScale:(r*2)/512,
yScale:(r*2)/512
}
}
})

body.member=next.member
body.level=next.level

World.add(world,body)

next=createNext()
updateNext()

}

Events.on(engine,"collisionStart",event=>{

for(const pair of event.pairs){

const a=pair.bodyA
const b=pair.bodyB

if(!a.member||!b.member)continue
if(a.member.name!==b.member.name)continue
if(a.level!==b.level)continue

World.remove(world,a)
World.remove(world,b)

const level=a.level+1
if(level>=SIZE.length) return

const newMember=members[Math.floor(Math.random()*members.length)]

const x=(a.position.x+b.position.x)/2
const y=(a.position.y+b.position.y)/2

const r=SIZE[level]

const body=Bodies.circle(x,y,r,{
render:{
sprite:{
texture:newMember.img,
xScale:(r*2)/512,
yScale:(r*2)/512
}
}
})

body.member=newMember
body.level=level

World.add(world,body)

score+=10*(level+1)
document.getElementById("score").textContent=score

mergeEffect(x,y,r)

document.getElementById("mergeSE").play()

}

})

function mergeEffect(x,y,r){

const el=document.createElement("div")

el.style.position="absolute"
el.style.left=x+"px"
el.style.top=y+"px"
el.style.width=r*2+"px"
el.style.height=r*2+"px"
el.style.border="4px solid #8fd3ff"
el.style.borderRadius="50%"
el.style.transform="translate(-50%,-50%)"
el.style.animation="pop 0.4s forwards"

document.getElementById("game").appendChild(el)

setTimeout(()=>el.remove(),400)

}

document.getElementById("settings").onclick=()=>{

const p=document.getElementById("panel")
p.style.display=p.style.display==="block"?"none":"block"

}

const bgm=document.getElementById("bgm")
const mergeSE=document.getElementById("mergeSE")
const overSE=document.getElementById("overSE")

bgm.volume=0.5
bgm.play()

document.getElementById("bgmVol").oninput=e=>{
bgm.volume=e.target.value
}

document.getElementById("seVol").oninput=e=>{
mergeSE.volume=e.target.value
overSE.volume=e.target.value
}

function restart(){
location.reload()
}

</script>

</body>
</html>
