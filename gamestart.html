<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日プ新世界 Face Game</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<style>
:root{
  --bg:#050B4A;
  --panel:rgba(255,255,255,0.08);
  --panel-border:rgba(103,154,255,0.35);
  --accent:#1673FF;
  --accent2:#8fd3ff;
  --text:#ffffff;
  --text-sub:#d8e3ff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:sans-serif;
  color:var(--text);
  text-align:center;
  background:
    linear-gradient(rgba(5,11,74,0.90), rgba(5,11,74,0.95)),
    url("https://i.imgur.com/b8qJMXj.jpeg") center/cover no-repeat fixed;
}

.page{
  max-width:980px;
  margin:0 auto;
  padding:18px 14px 28px;
}

.topbar{
  position:relative;
  margin-bottom:10px;
}

.logo{
  width:100%;
  max-width:900px;
  margin:0 auto 12px;
  display:block;
}

#line{
  position:absolute;
  top:110px;
  width:100%;
  border-top:3px dashed #8fd3ff;
  z-index:5;
  pointer-events:none;
}

/* 危険ライン */

#line.danger{
  border-top:3px dashed #ff3b3b;
  animation: dangerFlash 0.6s infinite;
  box-shadow:0 0 12px #ff3b3b;
}

@keyframes dangerFlash{
  0%{opacity:1;}
  50%{opacity:0.2;}
  100%{opacity:1;}
}

/* 以降は元コードそのまま */

#settings{
  position:absolute;
  top:8px;
  right:8px;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  border-radius:50%;
  background:rgba(11,28,107,0.9);
  border:1px solid rgba(143,211,255,0.45);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  user-select:none;
}

h2{
  margin:0 0 10px;
  font-size:28px;
}

#ui{
  display:flex;
  justify-content:center;
  gap:18px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.ui-chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:999px;
  backdrop-filter:blur(8px);
  color:var(--text);
}

#nextImg{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  background:#fff;
  border:2px solid rgba(145,201,255,0.55);
}

#nextName{
  font-size:13px;
  color:var(--text-sub);
  min-width:110px;
  text-align:left;
}

.level-panel{
  max-width:860px;
  margin:0 auto 12px;
}

.level-toggle{
  width:100%;
  max-width:420px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg,#2680ff,#1356cc);
  color:#fff;
  cursor:pointer;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#2680ff,#1356cc);
  color:white;
  cursor:pointer;
}

#selectedMembers{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:0 auto 12px;
}

.game-wrap{
  width:420px;
  height:620px;
  margin:auto;
  position:relative;
}

#game{
  width:420px;
  height:620px;
  margin:auto;
  border:3px solid #3aa7ff;
  border-radius:18px;
  position:relative;
  overflow:hidden;
}

#effects{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:8;
}

#gameOverOverlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(2,7,40,0.58);
}

</style>
</head>

<body>
<div class="page">

<div class="topbar">
<img class="logo" src="https://i.imgur.com/JtJqifb.png">
<div id="settings">⚙️</div>
</div>

<h2>日プ新世界 Face Game</h2>

<div id="ui">
<div class="ui-chip">Score : <span id="score">0</span></div>

<div class="ui-chip">
<div>NEXT</div>
<img id="nextImg">
<div id="nextName"></div>
</div>
</div>

<div class="game-wrap">
<div id="game">
<div id="line"></div>
</div>

<div id="effects"></div>

<div id="gameOverOverlay">
<h2>GAME OVER</h2>
<p>Score : <span id="finalScore">0</span></p>
<button onclick="location.reload()">もう一回</button>
</div>
</div>

</div>

<script>

const members =
JSON.parse(localStorage.getItem("selectedMembers")) ||
JSON.parse(localStorage.getItem("members")) || [];

if(!members.length){
location.href="index.html";
}

const {Engine,Render,Runner,World,Bodies,Events,Composite,Body}=Matter;

const SIZE=[20,24,28,32,37,43,50,58,67,77,88];

const GAME_OVER_LINE_Y=110;

const engine=Engine.create();
const world=engine.world;

const render=Render.create({
element:document.getElementById("game"),
engine:engine,
options:{
width:420,
height:620,
wireframes:false,
background:"transparent"
}
});

Render.run(render);
Runner.run(Runner.create(),engine);

const ground=Bodies.rectangle(210,640,420,60,{isStatic:true});
const left=Bodies.rectangle(-30,310,60,620,{isStatic:true});
const right=Bodies.rectangle(450,310,60,620,{isStatic:true});

World.add(world,[ground,left,right]);

let score=0;
let next=createNext();
let overLineStart=null;
let isGameOver=false;

function createNext(){
const evoIndex=Math.floor(Math.random()*3);
return{
member:members[evoIndex],
evoIndex:evoIndex
};
}

function updateNext(){
document.getElementById("nextImg").src=next.member.gameImg||next.member.img;
document.getElementById("nextName").textContent=`Lv${next.evoIndex+1}`;
}

function spawn(x){

const r=SIZE[next.evoIndex];

const body=Bodies.circle(x,60,r,{
restitution:0.15,
render:{
sprite:{
texture:next.member.gameImg||next.member.img,
xScale:0.12,
yScale:0.12
}
}
});

body.member=next.member;
body.evoIndex=next.evoIndex;

World.add(world,body);

next=createNext();
updateNext();
}

document.getElementById("game").onclick=e=>{
const rect=e.target.getBoundingClientRect();
spawn(e.clientX-rect.left);
};

Events.on(engine,"collisionStart",event=>{

for(const pair of event.pairs){

const a=pair.bodyA;
const b=pair.bodyB;

if(!a.member||!b.member)continue;
if(a.evoIndex!==b.evoIndex)continue;

const nextIndex=a.evoIndex+1;

World.remove(world,a);
World.remove(world,b);

/* Lv11完成で消滅 */

if(nextIndex>=members.length){

score+=5120;

document.getElementById("score").textContent=score;
document.getElementById("finalScore").textContent=score;

continue;

}

const newMember=members[nextIndex];

const x=(a.position.x+b.position.x)/2;
const y=(a.position.y+b.position.y)/2;

const r=SIZE[nextIndex];

const body=Bodies.circle(x,y,r,{
render:{
sprite:{
texture:newMember.gameImg||newMember.img,
xScale:0.12,
yScale:0.12
}
}
});

body.member=newMember;
body.evoIndex=nextIndex;

World.add(world,body);

/* 新スコア配分 */

const addScore=Math.pow(2,nextIndex-1)*10;

score+=addScore;

document.getElementById("score").textContent=score;
document.getElementById("finalScore").textContent=score;

}

});

function checkGameOver(){

if(isGameOver)return;

const bodies=Composite.allBodies(world).filter(b=>!b.isStatic&&b.member);

const line=document.getElementById("line");

const touching=bodies.some(body=>{
const radius=SIZE[body.evoIndex]||body.circleRadius||0;
return(body.position.y-radius)<=GAME_OVER_LINE_Y;
});

if(touching){

line.classList.add("danger");

if(!overLineStart){
overLineStart=performance.now();
}
else if(performance.now()-overLineStart>1200){
isGameOver=true;
document.getElementById("gameOverOverlay").style.display="flex";
}

}else{

line.classList.remove("danger");
overLineStart=null;

}

}

(function loop(){
checkGameOver();
requestAnimationFrame(loop);
})();

updateNext();

</script>

</body>
</html>
