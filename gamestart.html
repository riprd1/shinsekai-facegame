<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日プ新世界 Face Game</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<style>
:root{
  --bg:#050B4A;
  --panel:rgba(255,255,255,0.08);
  --panel-border:rgba(103,154,255,0.35);
  --accent:#1673FF;
  --accent2:#8fd3ff;
  --text:#ffffff;
  --text-sub:#d8e3ff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:sans-serif;
  color:var(--text);
  text-align:center;
  background:
    linear-gradient(rgba(5,11,74,0.90), rgba(5,11,74,0.95)),
    url("https://i.imgur.com/b8qJMXj.jpeg") center/cover no-repeat fixed;
}

.page{
  max-width:980px;
  margin:0 auto;
  padding:18px 14px 28px;
  position:relative;
}

.topbar{
  position:relative;
  height:58px;
  margin-bottom:10px;
}

.logo{
  width:100%;
  max-width:900px;
  margin:0 auto 12px;
  display:block;
}

#settings{
  position:absolute;
  top:8px;
  right:8px;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  border-radius:50%;
  background:rgba(11,28,107,0.9);
  border:1px solid rgba(143,211,255,0.45);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  user-select:none;
  z-index:25;
}

h2{
  margin:0 0 10px;
  font-size:28px;
}

#ui{
  display:flex;
  justify-content:center;
  gap:18px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.ui-chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:999px;
  backdrop-filter:blur(8px);
  color:var(--text);
}

#nextImg{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  background:#fff;
  border:2px solid rgba(145,201,255,0.55);
}

#nextName{
  font-size:13px;
  color:var(--text-sub);
  min-width:110px;
  text-align:left;
}

.level-panel{
  max-width:860px;
  margin:0 auto 12px;
}

.level-toggle{
  width:100%;
  max-width:420px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg,#2680ff,#1356cc);
  color:#fff;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(10,37,130,0.3);
}

#selectedMembersWrap{
  margin-top:10px;
}

#selectedMembersWrap.hidden{
  display:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#2680ff,#1356cc);
  color:white;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(10,37,130,0.3);
}

button:hover{
  opacity:0.95;
}

#selectedMembers{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:0 auto 12px;
  max-width:860px;
  min-height:64px;
}

.selected-mini{
  width:58px;
  font-size:9px;
  line-height:1.25;
  color:var(--text);
}

.selected-mini img{
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  background:#fff;
  display:block;
  margin:0 auto 4px;
  border:2px solid rgba(145,201,255,0.55);
}

.daily-mission-panel{
  max-width:860px;
  margin:0 auto 14px;
  padding:14px 14px 12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(103,154,255,0.35);
  border-radius:16px;
  backdrop-filter:blur(8px);
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.daily-mission-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.daily-mission-title{
  font-size:16px;
  font-weight:700;
  color:#ffffff;
}

.daily-mission-progress{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  min-width:220px;
}

.daily-mission-progressbar{
  flex:1;
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,0.12);
  overflow:hidden;
  border:1px solid rgba(143,211,255,0.18);
}

.daily-mission-progressbar span{
  display:block;
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#7ed7ff,#7aa8ff,#b78cff);
  box-shadow:0 0 12px rgba(143,211,255,0.35);
  transition:width 0.25s ease;
}

.daily-mission-progresstext{
  min-width:52px;
  text-align:right;
  font-size:12px;
  color:#d8e3ff;
  font-weight:700;
}

.daily-mission-body{
  display:flex;
  gap:12px;
  align-items:stretch;
}

.daily-mission-list{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.daily-mission-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  text-align:left;
}

.daily-mission-item.done{
  background:rgba(111,255,176,0.12);
  border-color:rgba(111,255,176,0.35);
}

.daily-mission-item-left{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.daily-mission-check{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid rgba(143,211,255,0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:transparent;
  flex-shrink:0;
}

.daily-mission-item.done .daily-mission-check{
  background:#6fff9e;
  border-color:#6fff9e;
  color:#06321a;
}

.daily-mission-text{
  font-size:13px;
  color:#fff;
  line-height:1.45;
  word-break:break-word;
}

.daily-mission-status{
  flex-shrink:0;
  font-size:12px;
  color:#d8e3ff;
  font-weight:700;
}

.daily-mission-item.done .daily-mission-status{
  color:#9dffbf;
}

.daily-mission-chest{
  width:88px;
  min-width:88px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:6px;
  padding:10px 8px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
}

.daily-mission-chest-icon{
  font-size:34px;
  line-height:1;
  filter:drop-shadow(0 0 10px rgba(255,220,120,0.25));
}

.daily-mission-chest.ready .daily-mission-chest-icon{
  animation:chestGlow 1s infinite alternate;
}

.daily-mission-chest-label{
  font-size:11px;
  color:#d8e3ff;
  line-height:1.4;
}

@keyframes chestGlow{
  0%{
    transform:scale(1);
    filter:drop-shadow(0 0 8px rgba(255,220,120,0.3));
  }
  100%{
    transform:scale(1.08);
    filter:drop-shadow(0 0 16px rgba(255,220,120,0.65));
  }
}

.game-wrap{
  width:420px;
  height:620px;
  margin:auto;
  position:relative;
}

#game{
  width:420px;
  height:620px;
  margin:auto;
  border:3px solid #3aa7ff;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top, rgba(86,187,255,0.22), transparent 25%),
    linear-gradient(180deg,#09145f 0%,#071050 40%,#03083b 100%);
  box-shadow:0 18px 40px rgba(0,0,0,0.28);
}

#line{
  position:absolute;
  top:110px;
  width:100%;
  border-top:3px dashed #8fd3ff;
  z-index:5;
  pointer-events:none;
}

#line.danger{
  border-top:3px dashed #ff3b3b;
  box-shadow:0 0 12px #ff3b3b;
  animation:dangerFlash 0.6s infinite;
}

@keyframes dangerFlash{
  0%{opacity:1;}
  50%{opacity:0.2;}
  100%{opacity:1;}
}

#dropGuide{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:6;
}

#dropGuide::before{
  content:"";
  position:absolute;
  top:16px;
  bottom:0;
  left:50%;
  width:2px;
  transform:translateX(-50%);
  background:linear-gradient(to bottom, rgba(143,211,255,0.55), rgba(143,211,255,0));
  opacity:0;
  transition:opacity 0.15s ease;
}

#dropGuide.active::before{
  opacity:1;
}

#dropGhost{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:92px;
  height:92px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(143,211,255,0.95);
  background:rgba(255,255,255,0.08);
  box-shadow:0 8px 20px rgba(25,45,120,0.24);
  transition:left 0.03s linear;
  display:flex;
  align-items:center;
  justify-content:center;
}

#dropGhost img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  transform-origin:center center;
  transition:transform 0.12s ease;
}

#effects{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:8;
  overflow:hidden;
}

.merge-burst{
  position:absolute;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0.2);
  border:4px solid rgba(143,211,255,0.95);
  background:rgba(70,157,255,0.2);
  box-shadow:0 0 24px rgba(87,189,255,0.42);
  animation:pop 0.45s ease-out forwards;
}

.merge-burst.max{
  border:5px solid #ffe98a;
  background:rgba(255,223,79,0.28);
  box-shadow:0 0 28px rgba(255,227,120,0.7);
}

.merge-text{
  position:absolute;
  transform:translate(-50%,-50%);
  color:#dff4ff;
  font-weight:700;
  font-size:14px;
  white-space:nowrap;
  text-shadow:0 0 10px rgba(74,170,255,0.7);
  animation:floatText 0.75s ease-out forwards;
}

.merge-text.max{
  color:#fff6b0;
  text-shadow:0 0 14px rgba(255,229,97,0.95);
  font-size:18px;
}

@keyframes pop{
  0%{opacity:1; transform:translate(-50%,-50%) scale(0.2);}
  100%{opacity:0; transform:translate(-50%,-50%) scale(1.8);}
}

@keyframes floatText{
  0%{opacity:0; transform:translate(-50%,-30%) scale(0.8);}
  20%{opacity:1; transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0; transform:translate(-50%,-95px) scale(1.06);}
}

#gameOverOverlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(2,7,40,0.58);
  z-index:10;
  backdrop-filter:blur(4px);
}

.gameover-card{
  width:300px;
  background:rgba(7,18,82,0.92);
  border-radius:18px;
  padding:22px 18px;
  border:1px solid rgba(126,214,255,0.5);
  box-shadow:0 16px 40px rgba(0,0,0,0.28);
  opacity:0;
  transform:translateY(22px) scale(0.94);
}

.gameover-card.show{
  animation:gameoverPop 0.55s ease forwards;
}

@keyframes gameoverPop{
  0%{
    opacity:0;
    transform:translateY(22px) scale(0.94);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.gameover-card h3{
  margin:0 0 10px;
  color:#8fe7ff;
  font-size:28px;
}

.gameover-sub{
  margin:0 0 12px;
  color:#d8e3ff;
  font-size:14px;
  line-height:1.7;
}

.gameover-actions{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.gameover-actions button{
  opacity:0;
  transform:translateY(12px);
}

.gameover-actions.show button{
  animation:fadeUpBtn 0.45s ease forwards;
}

.gameover-actions.show button:nth-child(1){
  animation-delay:0.15s;
}

.gameover-actions.show button:nth-child(2){
  animation-delay:0.28s;
}

.gameover-actions.show button:nth-child(3){
  animation-delay:0.41s;
}

@keyframes fadeUpBtn{
  0%{
    opacity:0;
    transform:translateY(12px);
  }
  100%{
    opacity:1;
    transform:translateY(0);
  }
}

#unlockOverlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(2,7,40,0.72);
  z-index:12;
  backdrop-filter:blur(4px);
}

.unlock-card{
  width:300px;
  background:linear-gradient(180deg, rgba(24,38,115,0.96), rgba(7,18,82,0.96));
  border-radius:20px;
  padding:24px 18px 20px;
  border:1px solid rgba(255,230,134,0.72);
  box-shadow:0 0 24px rgba(255,218,92,0.45), 0 16px 42px rgba(0,0,0,0.32);
  text-align:center;
}

.unlock-card h3{
  margin:0 0 12px;
  color:#ffe98a;
  font-size:28px;
  letter-spacing:0.05em;
  text-shadow:0 0 14px rgba(255,234,138,0.6);
}

.unlock-card img{
  width:96px;
  height:96px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  display:block;
  margin:0 auto 12px;
  background:#fff;
  border:3px solid #ffe98a;
  box-shadow:0 0 18px rgba(255,230,134,0.42);
}

.unlock-card p{
  margin:6px 0;
  line-height:1.7;
  color:#fff;
}

.unlock-card .unlock-name{
  font-size:18px;
  color:#ffe98a;
  font-weight:700;
}

#skinRewardOverlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(2,7,40,0.76);
  z-index:14;
  backdrop-filter:blur(5px);
}

.skin-reward-card{
  width:320px;
  background:linear-gradient(180deg, rgba(18,31,108,0.98), rgba(7,18,82,0.98));
  border-radius:20px;
  padding:24px 18px 20px;
  border:1px solid rgba(255,143,211,0.4);
  box-shadow:0 0 24px rgba(255,143,211,0.24), 0 16px 42px rgba(0,0,0,0.34);
  text-align:center;
  opacity:0;
  transform:translateY(16px) scale(0.96);
  animation:rewardPop 0.45s ease forwards;
}

@keyframes rewardPop{
  0%{
    opacity:0;
    transform:translateY(16px) scale(0.96);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.skin-reward-card h3{
  margin:0 0 10px;
  color:#ffb5df;
  font-size:26px;
  text-shadow:0 0 12px rgba(255,143,211,0.38);
}

.skin-reward-sub{
  margin:0 0 12px;
  color:#d8e3ff;
  font-size:14px;
  line-height:1.7;
}

.skin-reward-list{
  margin:10px 0 14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.skin-reward-item{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:#fff;
  min-height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  letter-spacing:0.03em;
}

.skin-reward-item.revealed{
  color:#ffb5df;
  border:1px solid rgba(255,143,211,0.35);
  background:rgba(255,105,180,0.12);
}

.skin-reward-result{
  min-height:42px;
  margin:0 0 14px;
  line-height:1.7;
  color:#fff;
  font-size:14px;
}

#panel{
  position:absolute;
  top:56px;
  right:8px;
  background:#0b1c6b;
  padding:12px;
  border-radius:12px;
  display:none;
  border:1px solid rgba(143,211,255,0.35);
  box-shadow:0 14px 28px rgba(0,0,0,0.22);
  z-index:20;
  text-align:left;
  min-width:220px;
}

.panel-row{
  margin-bottom:10px;
  font-size:14px;
}

.panel-row:last-child{
  margin-bottom:0;
}

.panel-row label{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin-bottom:4px;
}

.panel-action-btn{
  width:100%;
  margin-top:2px;
}

input[type="range"]{
  width:100%;
  accent-color:#66D9E6;
}

.hint{
  margin-top:12px;
  color:var(--text-sub);
  font-size:13px;
  line-height:1.6;
}

body,
img,
button,
div,
span,
p,
h1,
h2,
h3{
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

img{
  -webkit-user-drag:none;
  user-drag:none;
}

@media (max-width:520px){
  .game-wrap,#game{
    width:360px;
    height:560px;
  }

  .selected-mini{
    width:54px;
  }

  .selected-mini img{
    width:42px;
    height:42px;
  }

  .daily-mission-body{
    flex-direction:column;
  }

  .daily-mission-chest{
    width:100%;
    min-width:0;
    flex-direction:row;
  }
}
</style>
</head>

<body>
<div class="page">

  <div class="topbar">
    <div id="settings">⚙️</div>
  </div>

  <div class="level-panel">
    <button id="levelToggle" class="level-toggle">▼ レベル表</button>
    <div id="selectedMembersWrap">
      <div id="selectedMembers"></div>
    </div>
  </div>

  <div id="ui">
    <div class="ui-chip">Score : <span id="score">0</span></div>
    <div class="ui-chip">
      <div id="next">
        NEXT
      </div>
      <img id="nextImg" alt="next">
      <div id="nextName"></div>
    </div>
  </div>

  <div class="daily-mission-panel">
    <div class="daily-mission-head">
      <div class="daily-mission-title">デイリーミッション</div>
      <div class="daily-mission-progress">
        <div class="daily-mission-progressbar">
          <span id="dailyMissionProgressBar"></span>
        </div>
        <div class="daily-mission-progresstext" id="dailyMissionProgressText">0/3</div>
      </div>
    </div>
    <div class="daily-mission-body">
      <div class="daily-mission-list" id="dailyMissionList"></div>
      <div class="daily-mission-chest" id="dailyMissionChest">
        <div class="daily-mission-chest-icon">🎁</div>
        <div class="daily-mission-chest-label">3個達成で宝箱</div>
      </div>
    </div>
  </div>

  <div class="game-wrap">
    <div id="game">
      <div id="line"></div>
    </div>

    <div id="dropGuide">
      <div id="dropGhost"><img id="dropGhostImg" alt="waiting"></div>
    </div>

    <div id="effects"></div>

    <div id="gameOverOverlay">
      <div class="gameover-card" id="gameoverCard">
        <h3>GAME OVER</h3>
        <p>Score : <span id="finalScore">0</span></p>
        <p class="gameover-sub">Max Lv : <span id="finalMaxLevel">0</span><br>今のScoreをXでシェアしよう！</p>
        <div class="gameover-actions" id="gameoverActions">
          <button id="shareBtn">Xでシェア</button>
          <button id="retryBtn">リスタート</button>
          <button id="backTitleBtn">タイトルへ戻る</button>
        </div>
      </div>
    </div>

    <div id="unlockOverlay">
      <div class="unlock-card">
        <h3>NEW UNLOCK!</h3>
        <img id="unlockImg" src="" alt="スペシャルキャラ">
        <p class="unlock-name" id="unlockName"></p>
        <p>スペシャルキャラが解放されました！</p>
        <p>タイトル画面で確認できます！</p>
        <button id="unlockCloseBtn">OK</button>
      </div>
    </div>

    <div id="skinRewardOverlay">
      <div class="skin-reward-card">
        <h3>NEW SKIN GET!</h3>
        <p class="skin-reward-sub">ランダムスキンを獲得中...</p>
        <div id="skinRewardList" class="skin-reward-list"></div>
        <p id="skinRewardResult" class="skin-reward-result"></p>
        <button id="skinRewardCloseBtn">OK</button>
      </div>
    </div>
  </div>

  <div id="panel">
    <div class="panel-row">
      <label><span>BGM 🔈</span><span id="bgmVal">60%</span></label>
      <input id="bgmVol" type="range" min="0" max="100" step="1">
    </div>
    <div class="panel-row">
      <label><span>効果音 🔈</span><span id="seVal">80%</span></label>
