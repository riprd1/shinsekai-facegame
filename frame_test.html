<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フレーム一覧ギャラリー</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<style>
:root{
  --bg:#050B4A;
  --panel:rgba(255,255,255,0.08);
  --panel-border:rgba(103,154,255,0.35);
  --text:#ffffff;
  --text-sub:#d8e3ff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(5,11,74,0.90), rgba(5,11,74,0.95)),
    url("https://i.imgur.com/b8qJMXj.jpeg") center/cover no-repeat fixed;
}

body.bg-dark{
  background:
    linear-gradient(rgba(10,6,25,0.92), rgba(7,4,18,0.96)),
    radial-gradient(circle at top, rgba(125,95,255,0.18), transparent 25%);
}

body.bg-light{
  background:
    linear-gradient(rgba(190,220,255,0.88), rgba(130,180,255,0.94));
  color:#fff;
}

body.bg-pink{
  background:
    linear-gradient(rgba(95,26,91,0.92), rgba(42,8,38,0.96)),
    radial-gradient(circle at top, rgba(255,191,224,0.18), transparent 25%);
}

.page{
  max-width:1400px;
  margin:0 auto;
  padding:18px 14px 40px;
}

h1{
  margin:0 0 10px;
  text-align:center;
  font-size:30px;
}

.top-note{
  margin:0 0 18px;
  text-align:center;
  color:var(--text-sub);
  font-size:14px;
  line-height:1.8;
}

.toolbar{
  max-width:1100px;
  margin:0 auto 20px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(10px);
  box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

.toolbar-grid{
  display:grid;
  grid-template-columns:1.5fr 1fr 1fr 1fr auto auto;
  gap:10px;
  align-items:end;
}

.field{
  text-align:left;
}

.label{
  display:block;
  margin-bottom:6px;
  color:var(--text-sub);
  font-size:13px;
}

input[type="text"],
select{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px 12px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  outline:none;
}

select option{
  color:#000;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#2680ff,#1356cc);
  color:#fff;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(10,37,130,0.3);
  white-space:nowrap;
}

button:hover{
  opacity:0.95;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:16px;
}

.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(143,211,255,0.28);
  border-radius:18px;
  padding:12px;
  backdrop-filter:blur(8px);
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.card-head{
  margin-bottom:10px;
}

.frame-name{
  font-size:18px;
  font-weight:700;
  margin-bottom:4px;
}

.frame-meta{
  font-size:12px;
  color:var(--text-sub);
  line-height:1.6;
  min-height:38px;
}

.viewer{
  width:100%;
  aspect-ratio:1/1;
  border-radius:18px;
  overflow:hidden;
  border:2px solid rgba(143,211,255,0.45);
  background:
    radial-gradient(circle at top, rgba(86,187,255,0.22), transparent 25%),
    linear-gradient(180deg,#09145f 0%,#071050 40%,#03083b 100%);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);
}

body.bg-dark .viewer{
  background:
    radial-gradient(circle at top, rgba(144,81,255,0.16), transparent 25%),
    linear-gradient(180deg,#14081f 0%,#0c0718 40%,#04030c 100%);
  border-color:#8b63ff;
}

body.bg-light .viewer{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.45), transparent 22%),
    linear-gradient(180deg,#b9d8ff 0%,#9ec5ff 42%,#7db0ff 100%);
  border-color:#6ba7ff;
}

body.bg-pink .viewer{
  background:
    radial-gradient(circle at top, rgba(255,214,240,0.34), transparent 22%),
    linear-gradient(180deg,#68205f 0%,#4c1246 40%,#2a0826 100%);
  border-color:#ff95d2;
}

.mini{
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.mini img{
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  background:#fff;
  border:2px solid rgba(145,201,255,0.55);
  flex-shrink:0;
}

.mini-text{
  font-size:12px;
  color:var(--text-sub);
  line-height:1.5;
}

.notice{
  max-width:1100px;
  margin:18px auto 0;
  color:var(--text-sub);
  font-size:13px;
  line-height:1.8;
  text-align:center;
}

@media (max-width:980px){
  .toolbar-grid{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:560px){
  .toolbar-grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:25px;
  }
}
</style>
</head>
<body>
<div class="page">
  <h1>フレーム一覧ギャラリー</h1>
  <p class="top-note">
    すべてのフレームを同じ画像で同時に確認するページです。<br>
    画像URLを変えると全部まとめて反映されます。
  </p>

  <div class="toolbar">
    <div class="toolbar-grid">
      <div class="field">
        <label class="label" for="imageUrl">画像URL</label>
        <input id="imageUrl" type="text" value="https://i.imgur.com/zODWDAC.png" placeholder="https://...">
      </div>

      <div class="field">
        <label class="label" for="sizeSelect">サイズ</label>
        <select id="sizeSelect">
          <option value="42">小さめ</option>
          <option value="52">中</option>
          <option value="58" selected>標準</option>
          <option value="68">大きめ</option>
          <option value="78">かなり大きめ</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="bgSelect">背景</label>
        <select id="bgSelect">
          <option value="default">通常ブルー</option>
          <option value="dark">ダーク</option>
          <option value="light">ライト</option>
          <option value="pink">ピンク</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="filterRank">ランク絞り込み</label>
        <select id="filterRank">
          <option value="all">全部</option>
          <option value="N">N</option>
          <option value="R">R</option>
          <option value="SR">SR</option>
          <option value="SSR">SSR</option>
        </select>
      </div>

      <button id="applyBtn">反映</button>
      <button id="resetBtn">初期化</button>
    </div>
  </div>

  <div id="grid" class="grid"></div>

  <div class="notice">
    ・このページは frames.js の演出をそのまま使います。<br>
    ・frames.js と frame_gallery.html は同じ階層に置いてください。<br>
    ・ImgurはページURLではなく、直接画像URLを入れてください。
  </div>
</div>

<script>
window.Events = Matter.Events;
</script>
<script src="frames.js"></script>

<script>
const { Engine, Render, Runner, World, Bodies, Composite } = Matter;

const FRAME_MASTER = {
  "ピンクフレーム": {
    rank: "N",
    icons: "♡",
    color: "#ff8fc7",
    glow: "rgba(255,143,199,0.45)",
    desc: "やさしいピンクの定番フレーム"
  },
  "ゴールドフレーム": {
    rank: "R",
    icons: "★",
    color: "#ffd54f",
    glow: "rgba(255,213,79,0.48)",
    desc: "高級感のあるゴールドフレーム"
  },
  "ミントフレーム": {
    rank: "N",
    icons: "♡",
    color: "#72f2d0",
    glow: "rgba(114,242,208,0.42)",
    desc: "爽やかなミントカラーのフレーム"
  },
  "パープルフレーム": {
    rank: "R",
    icons: "★",
    color: "#b78cff",
    glow: "rgba(183,140,255,0.45)",
    desc: "クールな雰囲気のパープルフレーム"
  },
  "スターグロウ": {
    rank: "SR",
    icons: "★✨",
    color: "#ffe680",
    glow: "rgba(255,230,128,0.55)",
    desc: "星がきらめく人気フレーム"
  },
  "オーロラライン": {
    rank: "SR",
    icons: "✨",
    color: "#8fe7ff",
    glow: "rgba(143,231,255,0.55)",
    desc: "オーロラの光をまとったフレーム"
  },
  "ハートピンク": {
    rank: "R",
    icons: "♡♡",
    color: "#ff6fb0",
    glow: "rgba(255,111,176,0.48)",
    desc: "ハート感たっぷりのキュート系"
  },
  "スカイブルー": {
    rank: "N",
    icons: "♡",
    color: "#73c7ff",
    glow: "rgba(115,199,255,0.42)",
    desc: "すっきり見やすいブルーフレーム"
  },
  "ネオンパープル": {
    rank: "SR",
    icons: "★✨",
    color: "#d16dff",
    glow: "rgba(209,109,255,0.6)",
    desc: "ネオン感の強い映えるフレーム"
  },
  "シャイニーゴールド": {
    rank: "SSR",
    icons: "★✨♡",
    color: "#fff1a6",
    glow: "rgba(255,241,166,0.68)",
    desc: "特別感のある豪華フレーム"
  },
  "クリスタルフレーム": {
    rank: "SR",
    icons: "💎",
    color: "#bff3ff",
    glow: "rgba(191,243,255,0.58)",
    desc: "氷みたいに透き通るクリスタルフレーム"
  },
  "リボンレース": {
    rank: "R",
    icons: "🎀",
    color: "#ffc3df",
    glow: "rgba(255,195,223,0.52)",
    desc: "リボンとレースが上品に光るフレーム"
  },
  "バタフライフレーム": {
    rank: "SR",
    icons: "🦋",
    color: "#a9c8ff",
    glow: "rgba(169,200,255,0.54)",
    desc: "蝶がふわっと羽ばたく幻想フレーム"
  },
  "ダークムーン": {
    rank: "SR",
    icons: "🌙",
    color: "#b78cff",
    glow: "rgba(103,48,143,0.42)",
    desc: "三日月と紫黒のもやが妖しく揺れる"
  },
  "ギャラクシー": {
    rank: "SSR",
    icons: "🌌",
    color: "#8ea7ff",
    glow: "rgba(142,167,255,0.58)",
    desc: "青紫の宇宙がゆっくり回るフレーム"
  },
  "キャンディ": {
    rank: "R",
    icons: "🍬",
    color: "#ff9fd6",
    glow: "rgba(255,159,214,0.5)",
    desc: "パステルに弾けるポップなキャンディフレーム"
  }
};

const imageUrlEl = document.getElementById("imageUrl");
const sizeSelectEl = document.getElementById("sizeSelect");
const bgSelectEl = document.getElementById("bgSelect");
const filterRankEl = document.getElementById("filterRank");
const applyBtn = document.getElementById("applyBtn");
const resetBtn = document.getElementById("resetBtn");
const gridEl = document.getElementById("grid");

const previewCards = [];

function getFrameMeta(frameName){
  return FRAME_MASTER[frameName] || null;
}

function setBodyBg(mode){
  document.body.classList.remove("bg-dark", "bg-light", "bg-pink");

  if (mode === "dark") document.body.classList.add("bg-dark");
  if (mode === "light") document.body.classList.add("bg-light");
  if (mode === "pink") document.body.classList.add("bg-pink");
}

function buildCard(frameName, meta, imageUrl, radius){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.rank = meta.rank;

  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML = `
    <div class="frame-name">${frameName}</div>
    <div class="frame-meta">${meta.rank} ｜ ${meta.icons} ｜ ${meta.desc}</div>
  `;

  const viewer = document.createElement("div");
  viewer.className = "viewer";

  const mini = document.createElement("div");
  mini.className = "mini";
  mini.innerHTML = `
    <img src="${imageUrl}" alt="${frameName}">
    <div class="mini-text">${frameName}<br>${meta.rank}</div>
  `;

  card.appendChild(head);
  card.appendChild(viewer);
  card.appendChild(mini);
  gridEl.appendChild(card);

  const width = viewer.clientWidth;
  const height = viewer.clientWidth;

  const engine = Engine.create();
  const world = engine.world;

  const render = Render.create({
    element: viewer,
    engine,
    options: {
      width,
      height,
      wireframes: false,
      background: "transparent",
      pixelRatio: window.devicePixelRatio || 1
    }
  });

  Render.run(render);
  Runner.run(Runner.create(), engine);

  const wall = 60;
  World.add(world, [
    Bodies.rectangle(width / 2, height + wall / 2, width, wall, { isStatic: true, render: { visible:false } }),
    Bodies.rectangle(-wall / 2, height / 2, wall, height, { isStatic: true, render: { visible:false } }),
    Bodies.rectangle(width + wall / 2, height / 2, wall, height, { isStatic: true, render: { visible:false } })
  ]);

  const body = Bodies.circle(width / 2, height / 2, radius, {
    isStatic: true,
    restitution: 0,
    friction: 0,
    frictionAir: 0,
    render: {
      sprite: {
        texture: imageUrl,
        xScale: (radius * 2 * 0.92) / 512,
        yScale: (radius * 2 * 0.92) / 512
      }
    }
  });

  body.member = { name: frameName };
  body.frameName = frameName;
  body.evoIndex = 0;

  World.add(world, body);
  FaceGameFrames.attachFrameRenderer(render, world, Composite, getFrameMeta);

  const miniImg = mini.querySelector("img");
  miniImg.style.borderColor = meta.color;
  miniImg.style.boxShadow = `0 0 10px ${meta.glow}`;

  previewCards.push({
    card,
    viewer,
    engine,
    render,
    world,
    body,
    miniImg,
    frameName
  });
}

function clearCards(){
  previewCards.forEach(item => {
    try{
      if (item.render && item.render.canvas) {
        item.render.canvas.remove();
      }
      if (item.render && item.render.textures) {
        item.render.textures = {};
      }
    }catch(e){}
  });
  previewCards.length = 0;
  gridEl.innerHTML = "";
}

function renderGallery(){
  clearCards();

  const imageUrl = imageUrlEl.value.trim() || "https://i.imgur.com/zODWDAC.png";
  const radius = Number(sizeSelectEl.value);
  const rankFilter = filterRankEl.value;

  Object.entries(FRAME_MASTER).forEach(([frameName, meta]) => {
    if (rankFilter !== "all" && meta.rank !== rankFilter) return;
    buildCard(frameName, meta, imageUrl, radius);
  });
}

applyBtn.addEventListener("click", () => {
  setBodyBg(bgSelectEl.value);
  renderGallery();
});

resetBtn.addEventListener("click", () => {
  imageUrlEl.value = "https://i.imgur.com/zODWDAC.png";
  sizeSelectEl.value = "58";
  bgSelectEl.value = "default";
  filterRankEl.value = "all";
  setBodyBg("default");
  renderGallery();
});

bgSelectEl.addEventListener("change", () => {
  setBodyBg(bgSelectEl.value);
});

setBodyBg("default");
renderGallery();
</script>
</body>
</html>
