<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Frame Test</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

#ui{
  padding:20px;
}

canvas{
  background:#222;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="ui">

<h2>フレームテスト</h2>

<input id="imgInput" type="text" placeholder="画像URLを入れる" style="width:400px">

<select id="frameSelect">

<option>スターグロウ</option>
<option>ゴールドフレーム</option>
<option>ネオンパープル</option>
<option>シャイニーゴールド</option>
<option>ハートピンク</option>
<option>ピンクフレーム</option>
<option>オーロラライン</option>
<option>ミントフレーム</option>
<option>スカイブルー</option>
<option>パープルフレーム</option>
<option>クリスタルフレーム</option>
<option>リボンレース</option>
<option>バタフライフレーム</option>
<option>ダークムーン</option>
<option>ギャラクシー</option>
<option>キャンディ</option>

</select>

<button id="applyBtn">反映</button>

</div>

<div id="game"></div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script src="frames.js"></script>

<script>

const {
Engine,
Render,
Runner,
Bodies,
Composite
} = Matter;

const engine = Engine.create();

const render = Render.create({
element: document.getElementById("game"),
engine: engine,
options:{
width:600,
height:600,
wireframes:false,
background:"#111"
}
});

Render.run(render);

const runner = Runner.create();
Runner.run(runner,engine);

const ground = Bodies.rectangle(
300,
590,
600,
40,
{isStatic:true}
);

Composite.add(engine.world,ground);

let testBody = null;

function getFrameMeta(name){

const map = {

"スターグロウ":{color:"#ffe680", glow:"#ffd84d", rank:"SSR"},
"ゴールドフレーム":{color:"#ffd700", glow:"#ffe680", rank:"SSR"},
"ネオンパープル":{color:"#a45cff", glow:"#c38cff", rank:"SR"},
"シャイニーゴールド":{color:"#ffd84d", glow:"#ffe680", rank:"SSR"},
"ハートピンク":{color:"#ff6aa8", glow:"#ff8fc2", rank:"SR"},
"ピンクフレーム":{color:"#ff6aa8", glow:"#ff8fc2", rank:"SR"},
"オーロラライン":{color:"#7ee7ff", glow:"#7ee7ff", rank:"SSR"},
"ミントフレーム":{color:"#7fffd4", glow:"#a8fff0", rank:"SR"},
"スカイブルー":{color:"#6ec8ff", glow:"#9be0ff", rank:"SR"},
"パープルフレーム":{color:"#a45cff", glow:"#c38cff", rank:"SR"},
"クリスタルフレーム":{color:"#b8f0ff", glow:"#e6fbff", rank:"SSR"},
"リボンレース":{color:"#ff9ed6", glow:"#ffd6ef", rank:"SR"},
"バタフライフレーム":{color:"#a98cff", glow:"#d0c3ff", rank:"SR"},
"ダークムーン":{color:"#b899ff", glow:"#a078ff", rank:"SR"},
"ギャラクシー":{color:"#7ea7ff", glow:"#9fc3ff", rank:"SSR"},
"キャンディ":{color:"#ff8bd6", glow:"#ffd0f2", rank:"SR"}

};

return map[name];

}

FaceGameFrames.attachFrameRenderer(
render,
engine.world,
Composite,
getFrameMeta
);

const img = new Image();

img.onload = function(){

if(testBody){

Composite.remove(engine.world,testBody);

}

const textureCanvas = document.createElement("canvas");
textureCanvas.width = 128;
textureCanvas.height = 128;

const ctx = textureCanvas.getContext("2d");

ctx.beginPath();
ctx.arc(64,64,64,0,Math.PI*2);
ctx.closePath();
ctx.clip();

ctx.drawImage(img,0,0,128,128);

const texture = textureCanvas.toDataURL();

testBody = Bodies.circle(
300,
200,
64,
{
restitution:0.9,
render:{
sprite:{
texture:texture,
xScale:1,
yScale:1
}
}
}
);

testBody.member = true;
testBody.frameName = document.getElementById("frameSelect").value;

Composite.add(engine.world,testBody);

};

document.getElementById("applyBtn").onclick = function(){

img.src = document.getElementById("imgInput").value;

};

</script>

</body>
</html>
