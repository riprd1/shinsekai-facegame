<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日プ新世界 Face Game</title>

<style>
:root{
  --bg:#050B4A;
  --accent:#1673FF;
  --accent2:#66D9E6;
  --text:#ffffff;
  --panel:rgba(255,255,255,0.08);
  --panel-border:rgba(103,154,255,0.35);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(5,11,74,0.88), rgba(5,11,74,0.94)),
    url("https://i.imgur.com/b8qJMXj.jpeg") center/cover no-repeat fixed;
  color:var(--text);
  text-align:center;
}

.page{
  max-width:1100px;
  margin:0 auto;
  padding:20px 14px 36px;
}

.logo-header{
  width:100%;
  max-width:900px;
  margin:0 auto 18px;
  display:block;
}

.top-sticky{
  position:sticky;
  top:0;
  z-index:30;
  padding:10px 0 12px;
  background:linear-gradient(rgba(5,11,74,0.96), rgba(5,11,74,0.82));
  backdrop-filter:blur(8px);
}

h1{
  margin:0 0 10px;
  font-size:28px;
  letter-spacing:0.03em;
}

.member-picker{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:12px 6px 20px;
}

.member{
  width:82px;
  cursor:pointer;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:14px;
  padding:8px 6px;
  line-height:1.3;
  font-size:10px;
  word-break:break-word;
  backdrop-filter:blur(8px);
  box-shadow:0 8px 18px rgba(0,0,0,0.14);
  transition:transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}

.member:hover{
  transform:translateY(-2px);
}

.member img{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  display:block;
  margin:0 auto 6px;
  background:#fff;
  border:2px solid rgba(145,201,255,0.45);
}

.selected{
  outline:none;
  border:2px solid #3aa7ff;
  box-shadow:0 0 0 1px rgba(58,167,255,0.45), 0 10px 24px rgba(22,115,255,0.28);
  background:rgba(22,115,255,0.18);
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:4px;
}

button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg, #2680ff, #1356cc);
  color:white;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(10,37,130,0.3);
}

button:hover{
  opacity:0.95;
}

.counter{
  margin-top:8px;
  font-size:14px;
  color:#d8e3ff;
}

@media (max-width:520px){
  .member{
    width:76px;
    font-size:9px;
  }

  .member img{
    width:56px;
    height:56px;
  }

  h1{
    font-size:24px;
  }

  .top-sticky{
    padding:8px 0 10px;
  }
}
</style>
</head>

<body>
<div class="page">

  <img class="logo-header" src="https://i.imgur.com/JtJqifb.png" alt="日プ新世界 ロゴ">

  <div class="top-sticky">
    <h1>日プ新世界 Face Game</h1>
    <div class="controls">
      <button id="startBtn">11人選んでゲームスタート</button>
    </div>
    <div class="counter">選択中: <span id="count">0</span> / 11</div>
  </div>

  <div id="picker" class="member-picker"></div>

</div>

const picker=document.getElementById("picker");
const countEl=document.getElementById("count");

let selected=[];

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function updateCount(){
  countEl.textContent=selected.length;
}

members.forEach(m=>{

const div=document.createElement("div");
div.className="member";

div.innerHTML=`<img src="${m.selectImg || m.img}"><br>${m.name}`;

div.onclick=()=>{

if(selected.includes(m)){
selected=selected.filter(x=>x!=m);
div.classList.remove("selected");
}else{

if(selected.length>=11){
alert("11人までです");
return;
}

selected.push(m);
div.classList.add("selected");

}

updateCount();

};

picker.appendChild(div);

});

document.getElementById("startBtn").onclick=()=>{

if(selected.length!==11){
alert("11人選んでください");
return;
}

const evolutionOrder = shuffle(selected);

localStorage.setItem("members",JSON.stringify(evolutionOrder));
localStorage.setItem("selectedMembers",JSON.stringify(evolutionOrder));

location.href="gamestart.html";

};

updateCount();
</script>
